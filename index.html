<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Treino Web</title>
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button class="icon-button back-button" id="backButton" aria-label="Voltar">←</button>
      <img src="assets/icon.svg" alt="" class="brand-icon" />
      <div>
        <p class="eyebrow">Sistema de musculação</p>
        <h1 id="pageTitle">Treino Web</h1>
      </div>
    </header>

    <main id="app" class="app-content"></main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button class="icon-button" id="modalClose" aria-label="Fechar">×</button>
      </div>
      <div id="modalBody"></div>
    </section>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
